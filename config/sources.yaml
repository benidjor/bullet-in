sources:
  - source_id: arsenal_official
    display_name: Arsenal.com
    tier: 0
    medium: official
    adapter: rss
    config: { feed_url: "https://www.arsenal.com/rss-feeds/news" }
    enabled: true
  - source_id: guardian
    display_name: The Guardian
    tier: 1.5
    medium: newspaper
    adapter: guardian_api
    config: { query: "Arsenal", section: "football" }
    enabled: true
  - source_id: bbc_sport
    display_name: BBC Sport
    tier: 2
    medium: newspaper
    adapter: html
    config:
      list_url: "https://www.bbc.com/sport/football/teams/arsenal"
      item_selector: "a[href*='/sport/football/articles/']"
    enabled: true
  - source_id: goal
    display_name: Goal.com
    tier: 2
    medium: newspaper
    adapter: playwright
    config:
      list_url: "https://www.goal.com/en/team/arsenal/news/4dsgumo7d4ztgmgmcwzj0scnv"
      item_selector: "a[data-testid='article-link']"
    enabled: true
  - source_id: football_london
    display_name: football.london
    tier: 4
    medium: newspaper
    adapter: html
    config:
      list_url: "https://www.football.london/arsenal-fc/"
      item_selector: "a.headline"
    enabled: true
  - source_id: x_handofarsnal
    display_name: handofarsnal (ITK)
    tier: 1.5
    medium: x
    adapter: x_twikit
    config: { handle: "handofarsnal", max_tweets: 20 }
    enabled: true
