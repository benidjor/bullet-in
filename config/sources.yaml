freshness_default_hours: 48   # SLO-5 신선도 전역 임계 (h)
tone_backfill_limit: 20       # 말투 백필 회차 상한 (429 여유 내, 라이브 실측 후 조정)

# 이적 키워드 공통 리스트 — 각 소스의 title_contains 에서 *transfer_kw 로 참조
transfer_keywords: &transfer_kw ["transfer", "sign", "signed", "signing", "deal", "loan", "bid", "fee", "medical", "agree", "agreed", "join", "joins", "target", "linked", "links", "contract", "swap", "move", "talks"]

sources:
  - source_id: arsenal_official
    display_name: Arsenal.com
    tier: 0
    outlet: Arsenal.com
    journalist_label: Arsenal Official
    medium: official
    adapter: arsenal_api
    config:
      # 2026-07 공홈 개편(목록 클라이언트 렌더링) → 비공식 GraphQL API 전환.
      # 필터는 어댑터 내 taxonomy 판별(Transfer news · Contract news + Men) — 'sign' 제목 필터 폐기
      pages: 2   # 페이지당 50건 · 최신순 — 평시 최근 100건 커버
    enabled: true
  - source_id: bbc_sport
    display_name: BBC Sport
    tier: 1.5   # 비전담 기준선 — 전담 (Mokbel) 은 min 가드로 기자 tier 1 승격
    outlet: BBC
    medium: newspaper
    adapter: html
    config:
      list_url: "https://www.bbc.com/sport/football/teams/arsenal"
      item_selector: "[data-testid='main-content'] a[href*='/sport/football/articles/']"
      title_selector: "span[class*='LinkPostHeadline']"
      title_contains: *transfer_kw
      body_selector: "article"
    enabled: true
  - source_id: bbc_gossip
    display_name: BBC Football Gossip
    tier: 4
    # outlet 미지정 — 지정하면 facet 에서 BBC(Tier 1)로 합쳐져 가십 41건이 승격된다
    journalist_label: BBC Gossip
    medium: newspaper
    adapter: html
    body_images: false   # 가십 라운드업 갤러리 (백페이지 스캔) 는 본문 노이즈 — 카드 썸네일만 사용 (2026-07-19 지시)
    config:
      list_url: "https://www.bbc.com/sport/football/gossip"
      item_selector: "a[href*='/sport/football/articles/']"
      body_selector: "article"   # 풀 수집 전환 (트랙 ⑥) — thumbnail_only 는 우선 규칙상 불요라 제거
    enabled: true
  - source_id: goal
    display_name: Goal.com
    tier: 4
    outlet: Goal.com
    medium: newspaper
    adapter: html
    config:
      # 2026-07 팀 슬러그 갱신 · 정적 서빙 확인 → playwright 에서 전환 (spec §4.1)
      list_url: "https://www.goal.com/en/team/arsenal/news/4dsgumo7d4zupm2ugsvm4zm4d"
      item_selector: "a[href^='/en/news/']:not([aria-label]), a[href^='/en/lists/']:not([aria-label])"
      base_url: "https://www.goal.com"
      title_contains: *transfer_kw
      body_selector: "article"
    enabled: true
  - source_id: football_london
    display_name: football.london
    tier: 4
    outlet: football.london
    medium: newspaper
    adapter: html
    journalist_allowlist: ["Tom Canton"]   # 아스날 전담 외 기자 drop (spec §3.1)
    config:
      list_url: "https://www.football.london/arsenal-fc/"
      item_selector: "a.headline"
      title_contains: *transfer_kw
      body_selector: "article"
    enabled: true
  - source_id: guardian
    display_name: The Guardian
    tier: 3
    outlet: The Guardian
    medium: newspaper
    adapter: guardian_api
    config:
      tag: "football/arsenal"
      title_contains: *transfer_kw
    enabled: true
  - source_id: skysports
    display_name: Sky Sports
    tier: 2   # 비전담 기준선 — 전담 (Sheth) 은 min 가드로 기자 tier 1.5 승격
    outlet: Sky Sports
    medium: newspaper
    adapter: html
    config:
      # 네비게이션 /football/news/ 혼입 배제 — 타일 헤드라인 스코프 (spec §4.3)
      list_url: "https://www.skysports.com/arsenal"
      item_selector: "h3.sdc-site-tile__headline a[href*='/football/news/']"
      base_url: "https://www.skysports.com"
      title_contains: *transfer_kw
      body_selector: "div.sdc-article-body"
    enabled: true
  - source_id: x_afcstuff
    display_name: afcstuff (aggregator)
    medium: x
    adapter: x_playwright
    credibility: x_mentions
    fallback_tier: 4
    freshness_hours: 24   # X 는 고빈도 소스 — 전역 48h 보다 좁게 감시
    config: { handle: "afcstuff", max_tweets: 30, cookies_path: "x_cookies.json", backtrack_config: "config/backtrack.yaml" }
    enabled: true
  - source_id: fmkorea
    display_name: fmkorea 축구 소식통
    medium: community
    adapter: fmkorea
    credibility: fmkorea
    lang: ko
    config:
      search_url: "https://www.fmkorea.com/search.php?mid=football_news&search_target={target}&search_keyword={keyword}"
      search_keywords:
        - {keyword: "아스날", target: "title"}
        - {keyword: '"de roche"', target: "title_content"}
        - {keyword: "온스테인", target: "title_content"}
      item_selector: "a.hx"
      base_url: "https://www.fmkorea.com"
      body_selector: ".xe_content"
      max_posts: 15
    enabled: true  # 퍼가기 금지 정책·429 대응 구현 완료(2026-06-28)
