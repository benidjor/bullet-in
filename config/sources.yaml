sources:
  - source_id: arsenal_official
    display_name: Arsenal.com
    tier: 0
    medium: official
    adapter: html
    config:
      # 남자팀 필터 URL + 'sign'(영입·재계약) 제목만 → 공식 영입 확정 전용 고정밀 소스
      list_url: "https://www.arsenal.com/news?field_article_arsenal_team_value=men&revision_information="
      item_selector: "a.responsive-card__wrapper"
      base_url: "https://www.arsenal.com"
      title_contains: "sign"
      body_selector: "div.article-body, article"
    enabled: true
  - source_id: bbc_sport
    display_name: BBC Sport
    tier: 2
    medium: newspaper
    adapter: html
    config:
      list_url: "https://www.bbc.com/sport/football/teams/arsenal"
      item_selector: "[data-testid='main-content'] a[href*='/sport/football/articles/']"
      title_selector: "span[class*='LinkPostHeadline']"
      title_contains: ["transfer", "sign", "signed", "signing", "deal", "loan", "bid", "fee", "medical", "agree", "agreed", "join", "joins", "target", "linked", "links", "contract", "swap", "move", "talks"]
      body_selector: "article"
    enabled: true
  - source_id: bbc_gossip
    display_name: BBC Football Gossip
    tier: 4
    medium: newspaper
    adapter: html
    config:
      list_url: "https://www.bbc.com/sport/football/gossip"
      item_selector: "a[href*='/sport/football/articles/']"
    enabled: true
  - source_id: goal
    display_name: Goal.com
    tier: 2
    medium: newspaper
    adapter: playwright
    config:
      list_url: "https://www.goal.com/en/team/arsenal/news/4dsgumo7d4ztgmgmcwzj0scnv"
      item_selector: "a[data-testid='article-link']"
    enabled: false  # 라이브 점검: 셀렉터/동의월 문제로 일시 비활성 (후속 수정)
  - source_id: football_london
    display_name: football.london
    tier: 4
    medium: newspaper
    adapter: html
    config:
      list_url: "https://www.football.london/arsenal-fc/"
      item_selector: "a.headline"
      title_contains: ["transfer", "sign", "signed", "signing", "deal", "loan", "bid", "fee", "medical", "agree", "agreed", "join", "joins", "target", "linked", "links", "contract", "swap", "move", "talks"]
      body_selector: "article"
    enabled: true
  - source_id: x_afcstuff
    display_name: afcstuff (aggregator)
    medium: x
    adapter: x_playwright
    credibility: x_mentions
    fallback_tier: 4
    config: { handle: "afcstuff", max_tweets: 30, cookies_path: "x_cookies.json" }
    enabled: true
  - source_id: fmkorea
    display_name: fmkorea 축구 소식통
    medium: community
    adapter: fmkorea
    credibility: fmkorea
    lang: ko
    config:
      list_url: "https://www.fmkorea.com/football_news"
      item_selector: "a.title"
      keywords: ["아스날", "Arsenal"]
      body_selector: ".xe_content"
      base_url: "https://www.fmkorea.com"
      max_posts: 10
    enabled: true  # 퍼가기 금지 정책·429 대응 구현 완료(2026-06-28)
