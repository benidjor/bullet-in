# 통용 한글 표기 교정 사전 — 번역 결과 후처리 치환 (오표기 → 통용).
# LLM 번역이 간헐적으로 내는 비통용 표기를 결정적으로 교정한다 (enrich 후처리 + 백필 공용).
# 항목 추가 시: 오표기가 다른 단어에 부분 포함되지 않는지 확인 (짧은 문자열 주의).
replacements:
  모르간 로저스: 모건 로저스
  스캇: 스콧
